<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
  gsap.defaults({ ease: "sine.inOut" });

  // Gentle full-body sway
  gsap.to("#figure", {
    rotation: 1,
    transformOrigin: "388px 700px",
    duration: 3.5,
    repeat: -1,
    yoyo: true
  });

  // Crown/main body bob
  gsap.to("#mainBody", {
    y: -5,
    duration: 2.2,
    repeat: -1,
    yoyo: true
  });

  // Torso gradient pulse
  gsap.to("#torsoGrad", {
    scale: 1.04,
    transformOrigin: "380px 430px",
    duration: 1.5,
    repeat: -1,
    yoyo: true
  });

  // Left leg gradient orbs pulse
  gsap.to("#legL", {
    scale: 1.025,
    transformOrigin: "300px 1200px",
    duration: 1.8,
    repeat: -1,
    yoyo: true,
    delay: 0.3
  });

  // Right ankle orb pulse
  gsap.to("#orbRight", {
    scale: 1.1,
    transformOrigin: "555px 1030px",
    duration: 1.4,
    repeat: -1,
    yoyo: true,
    delay: 0.5
  });

  // Arms swing
  gsap.to("#armL", {
    rotation: 3,
    transformOrigin: "150px 480px",
    duration: 2.5,
    repeat: -1,
    yoyo: true
  });
  gsap.to("#armR", {
    rotation: -3,
    transformOrigin: "660px 520px",
    duration: 2.5,
    repeat: -1,
    yoyo: true,
    delay: 0.6
  });

  // Shoulders subtle movement
  gsap.to("#shoulderL", {
    rotation: 1.5,
    transformOrigin: "200px 400px",
    duration: 2.8,
    repeat: -1,
    yoyo: true
  });
  gsap.to("#shoulderR", {
    rotation: -1.5,
    transformOrigin: "600px 400px",
    duration: 2.8,
    repeat: -1,
    yoyo: true,
    delay: 0.4
  });

  // Body circles breathe
  gsap.to("#bodyCircles", {
    scale: 1.02,
    transformOrigin: "380px 700px",
    duration: 2,
    repeat: -1,
    yoyo: true
  });

  // Right leg shift
  gsap.to("#legR", {
    x: 3,
    duration: 2.5,
    repeat: -1,
    yoyo: true
  });

  // Left foot tap
  gsap.to("#footL", {
    rotation: -2,
    transformOrigin: "280px 1350px",
    duration: 2,
    repeat: -1,
    yoyo: true
  });

  // Lobes breathing
  gsap.to("#lobeLeft", {
    scale: 1.015,
    transformOrigin: "280px 920px",
    duration: 2.2,
    repeat: -1,
    yoyo: true
  });
  gsap.to("#lobeRight", {
    scale: 1.015,
    transformOrigin: "480px 920px",
    duration: 2.2,
    repeat: -1,
    yoyo: true,
    delay: 0.3
  });

  // Gradient color shifting
  document.querySelectorAll("linearGradient").forEach(grad => {
    grad.querySelectorAll("stop").forEach((stop, i) => {
      const orig = stop.getAttribute("stop-color");
      gsap.to(stop, {
        attr: { "stop-color": shiftColor(orig) },
        duration: 2 + i * 0.3,
        repeat: -1,
        yoyo: true,
        ease: "sine.inOut"
      });
    });
  });

  function shiftColor(hex) {
    if (!hex || hex.length < 7) return hex;
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `#${clamp(r+30).toString(16).padStart(2,'0')}${clamp(g-20).toString(16).padStart(2,'0')}${clamp(b+25).toString(16).padStart(2,'0')}`;
  }
  function clamp(v) { return Math.min(255, Math.max(0, v)); }

  // Accents fade
  gsap.to("#accents", {
    opacity: 0.4,
    duration: 2.5,
    repeat: -1,
    yoyo: true
  });
</script>
