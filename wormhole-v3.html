// --- Auto-Key ---
tlAutoKeyBtn.addEventListener('click', () => {
  TL.autoKey = !TL.autoKey;
  tlAutoKeyBtn.classList.toggle('auto-active', TL.autoKey);
});

// Auto-key: record a value change for a track (debounced per track)
let _tlApplying = false; // guard: true while timeline is driving values (prevent feedback loops)
const _autoKeyTimers = {};
function tlAutoRecord(track) {
  if (!TL.autoKey || _tlApplying) return;
  if (!TL.activeTracks.includes(track)) return;
  // Debounce: only record after 100ms of no changes (avoid flooding during drag)
  clearTimeout(_autoKeyTimers[track]);
  _autoKeyTimers[track] = setTimeout(() => {
    tlAddKeyframe(track, tlGetValue(track));
  }, 100);
}

// Immediate auto-record (for mouseup / end of interaction)
function tlAutoRecordNow(track) {
  if (!TL.autoKey || _tlApplying) return;
  if (!TL.activeTracks.includes(track)) return;
  clearTimeout(_autoKeyTimers[track]);
  tlAddKeyframe(track, tlGetValue(track));
}

// --- Bake: sample the live animation into keyframes ---
const tlBakeBtn = document.getElementById('tl-bake');
tlBakeBtn.addEventListener('click', () => {
  if (TL.activeTracks.length === 0) return;

  const fps = 4; // sample 4 keyframes per second (enough for smooth interp)
  const totalSamples = Math.ceil(TL.duration * fps) + 1;
  const stepDt = 1 / fps;

  // Save current state
  const savedTime = state.time;
  const savedFlowOffset = state.flowOffset;

  // Clear existing keyframes on active tracks
  for (const track of TL.activeTracks) {
    TL.keyframes[track] = [];
  }

  let simTime = state.time;

  for (let i = 0; i < totalSamples; i++) {
    const t = i * stepDt;
    if (t > TL.duration) break;

    if (i > 0) {
      simTime += stepDt;
      state.time = simTime;
      state.flowOffset = simTime * state.flowSpeed * state.flowDir;
    }

    // Sample all active tracks
    for (const track of TL.activeTracks) {
      const val = tlGetValue(track);
      const stored = Array.isArray(val) ? val.slice() : val;
      TL.keyframes[track].push({ time: Math.round(t * 100) / 100, value: stored });
    }
  }

  // Restore state
  state.time = savedTime;
  state.flowOffset = savedFlowOffset;

  tlRenderKeyframes();
});

// --- Ruler drawing ---
function tlRenderRuler() {
  const c = tlRulerCanvas;
  const rect = c.parentElement.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  c.width = rect.width * dpr;
  c.height = rect.height * dpr;
  c.style.width = rect.width + 'px';
  c.style.height = rect.height + 'px';
  const ctx = c.getContext('2d');
  ctx.scale(dpr, dpr);

  const w = rect.width, h = rect.height;
  ctx.clearRect(0, 0, w, h);

  // Tick marks every second, smaller marks every 0.5s
  ctx.fillStyle = '#555';
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';

  for (let t = 0; t <= TL.duration; t += 0.5) {
    const x = (t / TL.duration) * w;
    const isFull = t === Math.round(t);
    ctx.strokeStyle = isFull ? '#555' : '#333';
    ctx.beginPath();
    ctx.moveTo(x, h);
    ctx.lineTo(x, h - (isFull ? 12 : 6));
    ctx.stroke();
    if (isFull) {
      ctx.fillText(t + 's', x, 9);
    }
  }
}

// --- Playhead positioning ---
function tlUpdatePlayhead() {
  const pct = (TL.currentTime / TL.duration) * 100;
  tlPlayhead.style.left = pct + '%';
  tlTimeDisplay.textContent = TL.currentTime.toFixed(2) + ' / ' + TL.duration.toFixed(2) + 's';
}

// --- Scrub ruler / playhead ---
function tlScrubFromEvent(e) {
  const rect = tlRuler.getBoundingClientRect();
  const x = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  TL.currentTime = x * TL.duration;
  tlUpdatePlayhead();
  tlApplyAtTime(TL.currentTime);
}

tlRuler.addEventListener('mousedown', (e) => {
  TL.draggingPlayhead = true;
  tlScrubFromEvent(e);
});
window.addEventListener('mousemove', (e) => {
  if (TL.draggingPlayhead) tlScrubFromEvent(e);
  if (TL.draggingKF) tlDragKFMove(e);
});
window.addEventListener('mouseup', () => {
  TL.draggingPlayhead = false;
  if (TL.draggingKF) tlDragKFEnd();
});

// --- Keyframe rendering ---
function tlRenderKeyframes() {
  for (const [track, kfs] of Object.entries(TL.keyframes)) {
    const lane = document.getElementById('tl-lane-' + track);
    if (!lane) continue;
    const reg = TL_REGISTRY[track];
    if (!reg) continue;
    const isCurve = (reg.type === 'number' || reg.type === 'color');

    if (isCurve) {
      // Canvas-based curve rendering
      const cvs = lane._curveCanvas || lane.querySelector('.tl-curve-canvas');
      if (cvs) tlRenderCurveTrack(track, cvs);
    } else {
      // DOM-based flat diamond rendering (existing logic)
      lane.querySelectorAll('.tl-keyframe, .tl-span').forEach(el => el.remove());
      kfs.sort((a, b) => a.time - b.time);

      // Spans
      for (let i = 0; i < kfs.length - 1; i++) {
        const span = document.createElement('div');
        span.className = 'tl-span';
        const leftPct = (kfs[i].time / TL.duration) * 100;
        const rightPct = (kfs[i + 1].time / TL.duration) * 100;
        span.style.left = leftPct + '%';
        span.style.width = (rightPct - leftPct) + '%';
        lane.appendChild(span);
      }

      // Keyframe diamonds
      kfs.forEach((kf, idx) => {
        const el = document.createElement('div');
        el.className = 'tl-keyframe';
        if (TL.selectedKF && TL.selectedKF.track === track && TL.selectedKF.index === idx) {
          el.classList.add('selected');
        }
        el.style.left = (kf.time / TL.duration) * 100 + '%';

        const tip = document.createElement('div');
        tip.className = 'tl-kf-tooltip';
        let displayVal;
        if (Array.isArray(kf.value)) {
          const toHex = (rgb) => '#' + rgb.map(c => Math.round(c*255).toString(16).padStart(2,'0')).join('');
          displayVal = toHex(kf.value).toUpperCase();
        } else if (typeof kf.value === 'number') {
          displayVal = kf.value.toFixed(2);
        } else {
          displayVal = String(kf.value);
        }
        tip.textContent = displayVal + ' @ ' + kf.time.toFixed(2) + 's';
        el.appendChild(tip);

        el.addEventListener('mousedown', (e) => {
          e.stopPropagation();
          TL.selectedKF = { track, index: idx };
          TL.draggingKF = { track, index: idx, startX: e.clientX, startTime: kf.time };
          tlRenderKeyframes();
        });

        lane.appendChild(el);
      });
    }
  }
}

// === CURVE EDITOR: Canvas rendering ===
function tlRenderCurveTrack(track, canvas) {
  const reg = TL_REGISTRY[track];
  const kfs = TL.keyframes[track] || [];
  kfs.sort((a, b) => a.time - b.time);

  // Ensure auto-handles exist
  if (reg.type === 'color') tlAutoHandlesColor(track);
  else tlAutoHandles(track);

  const rect = canvas.parentElement.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const w = rect.width, h = rect.height;

  ctx.clearRect(0, 0, w, h);

  const range = tlGetTrackRange(track);
  const timeToX = (t) => (t / TL.duration) * w;
  const valueToY = (v) => h - ((v - range.min) / (range.max - range.min)) * h;
  const xToTime = (x) => (x / w) * TL.duration;
  const yToValue = (y) => range.min + (1 - y / h) * (range.max - range.min);

  // Store mapping on canvas for interaction
  canvas._tlMap = { w, h, range, timeToX, valueToY, xToTime, yToValue };

  // Grid lines
  ctx.strokeStyle = '#1a1a22';
  ctx.lineWidth = 1;
  // Vertical: time ticks
  for (let t = 0; t <= TL.duration; t += 0.5) {
    const x = timeToX(t);
    ctx.globalAlpha = (t === Math.round(t)) ? 0.5 : 0.2;
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
  }
  // Horizontal: value ticks
  const vStep = (range.max - range.min) / 4;
  ctx.globalAlpha = 0.3;
  for (let i = 0; i <= 4; i++) {
    const v = range.min + i * vStep;
    const y = valueToY(v);
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
  }
  // Value labels
  ctx.globalAlpha = 0.4;
  ctx.fillStyle = '#666';
  ctx.font = '8px monospace';
  ctx.textAlign = 'left';
  for (let i = 0; i <= 4; i++) {
    const v = range.min + i * vStep;
    const y = valueToY(v);
    ctx.fillText(v.toFixed(1), 2, y - 2);
  }
  ctx.globalAlpha = 1;

  if (kfs.length === 0) return;

  // Draw bezier curves
  if (reg.type === 'color') {
    // Three curves for R, G, B
    const colors = ['rgba(255,80,80,0.6)', 'rgba(80,255,80,0.6)', 'rgba(80,130,255,0.6)'];
    for (let ch = 0; ch < 3; ch++) {
      ctx.strokeStyle = colors[ch];
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(timeToX(kfs[0].time), valueToY(kfs[0].value[ch]));
      for (let i = 0; i < kfs.length - 1; i++) {
        const from = kfs[i], to = kfs[i + 1];
        const ho = from.handleOut || { dx: (to.time - from.time) / 3, dy: 0 };
        const hi = to.handleIn || { dx: -(to.time - from.time) / 3, dy: 0 };
        ctx.bezierCurveTo(
          timeToX(from.time + ho.dx), valueToY(from.value[ch] + ho.dy),
          timeToX(to.time + hi.dx), valueToY(to.value[ch] + hi.dy),
          timeToX(to.time), valueToY(to.value[ch])
        );
      }
      ctx.stroke();
    }
  } else {
    // Single curve for numeric tracks
    ctx.strokeStyle = '#ff881a';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    // Hold value before first keyframe
    if (kfs[0].time > 0) {
      ctx.moveTo(0, valueToY(kfs[0].value));
      ctx.lineTo(timeToX(kfs[0].time), valueToY(kfs[0].value));
    } else {
      ctx.moveTo(timeToX(kfs[0].time), valueToY(kfs[0].value));
    }
    for (let i = 0; i < kfs.length - 1; i++) {
      const from = kfs[i], to = kfs[i + 1];
      const segDur = to.time - from.time;
      const ho = from.handleOut || { dx: segDur / 3, dy: 0 };
      const hi = to.handleIn || { dx: -segDur / 3, dy: 0 };
      ctx.bezierCurveTo(
        timeToX(from.time + ho.dx), valueToY(from.value + ho.dy),
        timeToX(to.time + hi.dx), valueToY(to.value + hi.dy),
        timeToX(to.time), valueToY(to.value)
      );
    }
    // Hold value after last keyframe
    const last = kfs[kfs.length - 1];
    if (last.time < TL.duration) {
      ctx.lineTo(timeToX(TL.duration), valueToY(last.value));
    }
    ctx.stroke();
  }

  // Draw handles for selected keyframe
  if (TL.selectedKF && TL.selectedKF.track === track) {
    const selIdx = TL.selectedKF.index;
    const selKF = kfs[selIdx];
    if (selKF) {
      const kx = timeToX(selKF.time);
      const ky = reg.type === 'color' ? valueToY(selKF.value[0]) : valueToY(selKF.value);
      const val = reg.type === 'color' ? selKF.value[0] : selKF.value;

      // Handle Out
      if (selIdx < kfs.length - 1 && selKF.handleOut) {
        const hx = timeToX(selKF.time + selKF.handleOut.dx);
        const hy = valueToY(val + selKF.handleOut.dy);
        ctx.strokeStyle = '#888';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(kx, ky); ctx.lineTo(hx, hy); ctx.stroke();
        ctx.fillStyle = '#ccc';
        ctx.beginPath(); ctx.arc(hx, hy, 4, 0, Math.PI * 2); ctx.fill();
      }
      // Handle In
      if (selIdx > 0 && selKF.handleIn) {
        const hx = timeToX(selKF.time + selKF.handleIn.dx);
        const hy = valueToY(val + selKF.handleIn.dy);
        ctx.strokeStyle = '#888';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(kx, ky); ctx.lineTo(hx, hy); ctx.stroke();
        ctx.fillStyle = '#ccc';
        ctx.beginPath(); ctx.arc(hx, hy, 4, 0, Math.PI * 2); ctx.fill();
      }
    }
  }

  // Draw keyframe dots
  for (let i = 0; i < kfs.length; i++) {
    const kf = kfs[i];
    const kx = timeToX(kf.time);
    const ky = reg.type === 'color' ? valueToY(kf.value[0]) : valueToY(kf.value);
    const isSelected = TL.selectedKF && TL.selectedKF.track === track && TL.selectedKF.index === i;

    ctx.beginPath();
    ctx.arc(kx, ky, isSelected ? 6 : 4, 0, Math.PI * 2);
    ctx.fillStyle = isSelected ? '#4db3ff' : '#ff881a';
    ctx.fill();
    if (isSelected) {
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  }

  // Playhead indicator
  const phx = timeToX(TL.currentTime);
  ctx.strokeStyle = 'rgba(77,179,255,0.4)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(phx, 0); ctx.lineTo(phx, h); ctx.stroke();
}

// === CURVE EDITOR: Interaction ===
function tlCurveHitTest(track, canvas, mx, my) {
  const map = canvas._tlMap;
  if (!map) return null;
  const kfs = TL.keyframes[track] || [];
  const reg = TL_REGISTRY[track];
  const thresh = 8;

  // Check handles of selected keyframe first
  if (TL.selectedKF && TL.selectedKF.track === track) {
    const idx = TL.selectedKF.index;
    const kf = kfs[idx];
    if (kf) {
      const val = reg.type === 'color' ? kf.value[0] : kf.value;
      if (kf.handleOut && idx < kfs.length - 1) {
        const hx = map.timeToX(kf.time + kf.handleOut.dx);
        const hy = map.valueToY(val + kf.handleOut.dy);
        if (Math.abs(mx - hx) < thresh && Math.abs(my - hy) < thresh) {
          return { type: 'handleOut', index: idx };
        }
      }
      if (kf.handleIn && idx > 0) {
        const hx = map.timeToX(kf.time + kf.handleIn.dx);
        const hy = map.valueToY(val + kf.handleIn.dy);
        if (Math.abs(mx - hx) < thresh && Math.abs(my - hy) < thresh) {
          return { type: 'handleIn', index: idx };
        }
      }
    }
  }

  // Check keyframe dots
  for (let i = kfs.length - 1; i >= 0; i--) {
    const kf = kfs[i];
    const kx = map.timeToX(kf.time);
    const ky = reg.type === 'color' ? map.valueToY(kf.value[0]) : map.valueToY(kf.value);
    if (Math.abs(mx - kx) < thresh && Math.abs(my - ky) < thresh) {
      return { type: 'keyframe', index: i };
    }
  }

  return null;
}

let _curveDrag = null; // { track, canvas, type, index }

function tlCurveMouseDown(e, track, canvas) {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const hit = tlCurveHitTest(track, canvas, mx, my);

  if (hit) {
    e.stopPropagation();
    if (hit.type === 'keyframe') {
      TL.selectedKF = { track, index: hit.index };
    }
    _curveDrag = { track, canvas, type: hit.type, index: hit.index, altKey: e.altKey };
    tlRenderKeyframes();
  } else {
    // Deselect
    TL.selectedKF = null;
    tlRenderKeyframes();
  }
}

function tlCurveDblClick(e, track, canvas) {
  const map = canvas._tlMap;
  if (!map) return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const time = Math.round(map.xToTime(mx) * 20) / 20;
  const value = map.yToValue(my);

  const reg = TL_REGISTRY[track];
  if (reg.type === 'color') {
    // For color tracks, set all channels to the clicked value
    tlAddKeyframe(track, [value, value, value], time);
  } else {
    tlAddKeyframe(track, value, time);
  }
}

// Window-level handlers for curve drag
window.addEventListener('mousemove', (e) => {
  if (!_curveDrag) return;
  const { track, canvas, type, index, altKey } = _curveDrag;
  const map = canvas._tlMap;
  if (!map) return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const kfs = TL.keyframes[track];
  const kf = kfs[index];
  if (!kf) return;
  const reg = TL_REGISTRY[track];

  if (type === 'keyframe') {
    // Move keyframe time + value
    const newTime = Math.max(0, Math.min(TL.duration, Math.round(map.xToTime(mx) * 20) / 20));
    const newValue = map.yToValue(my);
    kf.time = newTime;
    if (reg.type === 'color') {
      // Move all channels proportionally (simplified: set first channel)
      const delta = newValue - kf.value[0];
      kf.value = kf.value.map(v => Math.max(0, Math.min(1, v + delta)));
    } else {
      kf.value = newValue;
    }
    kfs.sort((a, b) => a.time - b.time);
    // Update selected index after sort
    const newIdx = kfs.indexOf(kf);
    TL.selectedKF = { track, index: newIdx };
    _curveDrag.index = newIdx;
  } else if (type === 'handleOut' || type === 'handleIn') {
    const val = reg.type === 'color' ? kf.value[0] : kf.value;
    const dx = map.xToTime(mx) - kf.time;
    const dy = map.yToValue(my) - val;

    if (type === 'handleOut') {
      kf.handleOut = { dx: Math.max(0.01, dx), dy };
      // Mirror mode (default): mirror to handleIn unless Alt held
      if (!e.altKey && kf.handleIn) {
        kf.handleIn = { dx: -kf.handleOut.dx, dy: -kf.handleOut.dy };
      }
    } else {
      kf.handleIn = { dx: Math.min(-0.01, dx), dy };
      if (!e.altKey && kf.handleOut) {
        kf.handleOut = { dx: -kf.handleIn.dx, dy: -kf.handleIn.dy };
      }
    }
  }

  tlRenderKeyframes();
});

window.addEventListener('mouseup', () => {
  if (_curveDrag) {
    tlScheduleRebuild();
    _curveDrag = null;
  }
});

// --- Drag keyframe ---
function tlDragKFMove(e) {
  if (!TL.draggingKF) return;
  const lane = document.getElementById('tl-lane-' + TL.draggingKF.track);
  const rect = lane.getBoundingClientRect();
  const x = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  const newTime = x * TL.duration;
  TL.keyframes[TL.draggingKF.track][TL.draggingKF.index].time = Math.round(newTime * 20) / 20; // snap to 0.05s
  tlRenderKeyframes();
}

function tlDragKFEnd() {
  if (TL.draggingKF) tlScheduleRebuild();
  TL.draggingKF = null;
}

// --- Add keyframe to a specific track ---
function tlAddKeyframe(track, value, time) {
  if (!TL.keyframes[track]) TL.keyframes[track] = [];
  if (time === undefined) time = TL.currentTime;
  // Clone arrays (colors)
  const storedValue = Array.isArray(value) ? value.slice() : value;
  const existing = TL.keyframes[track].findIndex(kf => Math.abs(kf.time - time) < 0.05);
  if (existing >= 0) {
    TL.keyframes[track][existing].value = storedValue;
    TL.selectedKF = { track, index: existing };
  } else {
    TL.keyframes[track].push({ time, value: storedValue });
    TL.keyframes[track].sort((a, b) => a.time - b.time);
    const idx = TL.keyframes[track].findIndex(kf => Math.abs(kf.time - time) < 0.05);
    TL.selectedKF = { track, index: idx };
  }
  tlRenderKeyframes();
  tlScheduleRebuild();
}

// --- Get the current UI value for a track (reads from DOM, not state) ---
function tlGetUIValue(track) {
  const reg = TL_REGISTRY[track];
  if (!reg) return tlGetValue(track);

  if (reg.type === 'shape') {
    return document.getElementById('ringShape').value;
  }
  if (reg.type === 'color') {
    const picker = document.getElementById(track);
    if (picker) return hexToRGB(picker.value);
    return tlGetValue(track);
  }
  if (reg.type === 'discrete') {
    const el = document.getElementById(track);
    if (el && el.type === 'checkbox') return el.checked;
    if (el) return el.value;
  }
  return tlGetValue(track);
}

// --- Add keyframe button: only to selected track (or all if none selected) ---
tlAddKfBtn.addEventListener('click', () => {
  if (TL.selectedKF) {
    tlAddKeyframe(TL.selectedKF.track, tlGetUIValue(TL.selectedKF.track));
  } else if (TL.activeTracks.length === 1) {
    tlAddKeyframe(TL.activeTracks[0], tlGetUIValue(TL.activeTracks[0]));
  }
});

// --- Delete keyframe ---
tlDelKfBtn.addEventListener('click', () => {
  if (!TL.selectedKF) return;
  const { track, index } = TL.selectedKF;
  TL.keyframes[track].splice(index, 1);
  TL.selectedKF = null;
  tlRenderKeyframes();
  tlScheduleRebuild();
});

// --- Save / Load project ---
document.getElementById('tl-save').addEventListener('click', () => {
  const project = {
    version: 1,
    duration: TL.duration,
    ease: tlGetEase(),
    loopMode: tlLoopMode.value,
    activeTracks: TL.activeTracks.slice(),
    keyframes: {},
    state: {},
  };

  // Save keyframes
  for (const [track, kfs] of Object.entries(TL.keyframes)) {
    if (kfs.length > 0) {
      project.keyframes[track] = kfs.map(kf => ({
        time: kf.time,
        value: Array.isArray(kf.value) ? kf.value.slice() : kf.value,
        ...(kf.handleIn && { handleIn: { ...kf.handleIn } }),
        ...(kf.handleOut && { handleOut: { ...kf.handleOut } }),
      }));
    }
  }

  // Save current state snapshot
  for (const key of Object.keys(TL_REGISTRY)) {
    const val = tlGetValue(key);
    project.state[key] = Array.isArray(val) ? val.slice() : val;
  }

  const blob = new Blob([JSON.stringify(project, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `wormhole-project-${Date.now()}.json`;
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById('tl-load').addEventListener('click', () => {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.addEventListener('change', () => {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const project = JSON.parse(reader.result);

        // Restore duration, ease, loop mode
        if (project.duration) {
          TL.duration = project.duration;
          tlDurationInput.value = TL.duration;
        }
        if (project.ease) tlEaseSelect.value = project.ease;
        if (project.loopMode) tlLoopMode.value = project.loopMode;

        // Restore state
        if (project.state) {
          for (const [key, val] of Object.entries(project.state)) {
            if (!TL_REGISTRY[key]) continue;
            const reg = TL_REGISTRY[key];

            if (reg.type === 'color' && Array.isArray(val)) {
              state[key][0] = val[0]; state[key][1] = val[1]; state[key][2] = val[2];
              const toHex = (rgb) => '#' + rgb.map(c => Math.round(c*255).toString(16).padStart(2,'0')).join('');
              const hex = toHex(val);
              const picker = document.getElementById(key);
              const hexInput = document.getElementById(key + 'Hex');
              if (picker) picker.value = hex;
              if (hexInput) hexInput.value = hex.toUpperCase();
            } else if (reg.type === 'shape' || reg.type === 'discrete') {
              tlSetValue(key, val);
              const el = document.getElementById(key);
              if (el) {
                if (el.type === 'checkbox') el.checked = !!val;
                else el.value = val;
              }
            } else {
              tlSetValue(key, val);
              const uiId = reg.uiId || key;
              const el = document.getElementById(uiId);
              const valEl = document.getElementById(uiId + 'Val');
              if (el) el.value = val;
              if (valEl) valEl.textContent = typeof val === 'number' ? (val < 0.01 ? val.toFixed(3) : Number.isInteger(val) ? val : val.toFixed(2)) : val;
            }
          }
        }

        // Restore tracks and keyframes
        TL.activeTracks = project.activeTracks || [];
        TL.keyframes = {};
        for (const track of TL.activeTracks) {
          TL.keyframes[track] = (project.keyframes[track] || []).map(kf => ({
            time: kf.time,
            value: Array.isArray(kf.value) ? kf.value.slice() : kf.value,
            ...(kf.handleIn && { handleIn: { ...kf.handleIn } }),
            ...(kf.handleOut && { handleOut: { ...kf.handleOut } }),
          }));
        }

        // Rebuild UI
        tlRebuildTrackDOM();
        tlRenderRuler();
        tlRenderKeyframes();
        TL.currentTime = 0;
        tlUpdatePlayhead();
        tlScheduleRebuild();

      } catch (e) {
        console.error('Failed to load project:', e);
      }
    };
    reader.readAsText(file);
  });
  input.click();
});

// === CURVE EDITOR: Auto-handle computation ===
function tlAutoHandles(track) {
  const kfs = TL.keyframes[track];
  if (!kfs || kfs.length < 2) return;
  const reg = TL_REGISTRY[track];
  if (!reg || reg.type === 'shape' || reg.type === 'discrete') return;

  for (let i = 0; i < kfs.length; i++) {
    const prev = kfs[i - 1], curr = kfs[i], next = kfs[i + 1];

    // Skip if handles already manually set
    if (i > 0 && !curr.handleIn) {
      const dt = curr.time - prev.time;
      if (next) {
        const slope = (next.value - prev.value) / (next.time - prev.time);
        curr.handleIn = { dx: -dt / 3, dy: -slope * dt / 3 };
      } else {
        const slope = (curr.value - prev.value) / dt;
        curr.handleIn = { dx: -dt / 3, dy: -slope * dt / 3 };
      }
    }
    if (i < kfs.length - 1 && !curr.handleOut) {
      const dt = next.time - curr.time;
      if (prev) {
        const slope = (next.value - prev.value) / (next.time - prev.time);
        curr.handleOut = { dx: dt / 3, dy: slope * dt / 3 };
      } else {
        const slope = (next.value - curr.value) / dt;
        curr.handleOut = { dx: dt / 3, dy: slope * dt / 3 };
      }
    }
  }
}

// For color tracks, auto-handle each channel as if it were a number
function tlAutoHandlesColor(track) {
  const kfs = TL.keyframes[track];
  if (!kfs || kfs.length < 2) return;
  for (let i = 0; i < kfs.length; i++) {
    if (i > 0 && !kfs[i].handleIn) {
      const dt = kfs[i].time - kfs[i - 1].time;
      kfs[i].handleIn = { dx: -dt / 3, dy: 0 };
    }
    if (i < kfs.length - 1 && !kfs[i].handleOut) {
      const dt = kfs[i + 1].time - kfs[i].time;
      kfs[i].handleOut = { dx: dt / 3, dy: 0 };
    }
  }
}

function tlGetTrackRange(track) {
  const kfs = TL.keyframes[track];
  if (!kfs || kfs.length === 0) return { min: 0, max: 1 };
  const reg = TL_REGISTRY[track];
  if (reg && reg.type === 'color') return { min: 0, max: 1 };

  let min = Infinity, max = -Infinity;
  for (const kf of kfs) {
    if (kf.value < min) min = kf.value;
    if (kf.value > max) max = kf.value;
    // Include handle overshoot in range
    if (kf.handleOut) {
      const v = kf.value + kf.handleOut.dy;
      if (v < min) min = v;
      if (v > max) max = v;
    }
    if (kf.handleIn) {
      const v = kf.value + kf.handleIn.dy;
      if (v < min) min = v;
      if (v > max) max = v;
    }
  }
  // If all values same, create some padding
  if (max - min < 0.001) {
    const center = min;
    min = center - 1;
    max = center + 1;
  }
  // Add 15% padding
  const pad = (max - min) * 0.15;
  return { min: min - pad, max: max + pad };
}

// === CURVE EDITOR: Cubic Bezier Evaluation ===
// Solve for parameter t given target x, where bezier x = (1-t)^3*0 + 3(1-t)^2*t*p1x + 3(1-t)*t^2*p2x + t^3*1
function cubicBezierSolve(targetX, p1x, p2x, epsilon) {
  if (!epsilon) epsilon = 0.001;
  // Clamp control points
  p1x = Math.max(0, Math.min(1, p1x));
  p2x = Math.max(0, Math.min(1, p2x));

  let t = targetX; // Initial guess
  for (let i = 0; i < 8; i++) {
    const mt = 1 - t;
    const x = 3 * mt * mt * t * p1x + 3 * mt * t * t * p2x + t * t * t;
    const dx = 3 * mt * mt * p1x + 6 * mt * t * (p2x - p1x) + 3 * t * t * (1 - p2x);
    if (Math.abs(dx) < 1e-7) break;
    t -= (x - targetX) / dx;
    t = Math.max(0, Math.min(1, t));
  }
  return t;
}

function evalCubicBezierY(t, p0y, p1y, p2y, p3y) {
  const mt = 1 - t;
  return mt * mt * mt * p0y + 3 * mt * mt * t * p1y + 3 * mt * t * t * p2y + t * t * t * p3y;
}

// Evaluate a bezier segment: given linear progress (0-1), compute the value
function evalSegment(progress, from, to, segDur) {
  const ho = from.handleOut || { dx: segDur / 3, dy: 0 };
  const hi = to.handleIn || { dx: -segDur / 3, dy: 0 };

  // Control point X positions normalized to [0,1]
  const p1x = Math.max(0, Math.min(1, ho.dx / segDur));
  const p2x = Math.max(0, Math.min(1, 1 + hi.dx / segDur));

  // Find the parameter t for the given progress (x-solve)
  const t = cubicBezierSolve(progress, p1x, p2x);

  // Evaluate Y
  const p0y = from.value;
  const p1y = from.value + ho.dy;
  const p2y = to.value + hi.dy;
  const p3y = to.value;

  return evalCubicBezierY(t, p0y, p1y, p2y, p3y);
}

// === GSAP TIMELINE ENGINE ===
// Builds a GSAP timeline from keyframes, used for both playback and scrubbing
let gsapTL = null;
const tlLoopMode = document.getElementById('tl-loop-mode');
const tlEaseSelect = document.getElementById('tl-ease');

function tlGetEase() { return 'none'; }

// Sync UI for a given track at current state value
function tlSyncUI(track) {
  const reg = TL_REGISTRY[track];
  if (!reg) return;
  if (reg.type === 'color') {
    const toHex = (rgb) => '#' + rgb.map(c => Math.round(c*255).toString(16).padStart(2,'0')).join('');
    const hex = toHex(state[track]);
    const picker = document.getElementById(track);
    const hexInput = document.getElementById(track + 'Hex');
    if (picker) picker.value = hex;
    if (hexInput) hexInput.value = hex.toUpperCase();
  } else if (reg.type === 'shape') {
    document.getElementById('ringShape').value = state.ringShape;
  } else if (reg.type === 'discrete') {
    const el = document.getElementById(track);
    if (el) { if (el.type === 'checkbox') el.checked = !!state[track]; else el.value = state[track]; }
  } else {
    const uiId = reg.uiId || track;
    const el = document.getElementById(uiId);
    const valEl = document.getElementById(uiId + 'Val');
    const val = (reg.getter) ? reg.getter() : state[track];
    if (el) el.value = val;
    if (valEl) {
      const decimals = val < 0.01 ? 3 : (Number.isInteger(val) ? 0 : 2);
      valEl.textContent = (typeof val === 'number') ? val.toFixed(decimals) : val;
    }
  }
}

function tlBuildGSAPTimeline() {
  // Kill old timeline
  if (gsapTL) { gsapTL.kill(); gsapTL = null; }

  const loopMode = tlLoopMode.value;
  const repeat = loopMode === 'once' ? 0 : -1;
  const yoyo = loopMode === 'yoyo';
  const ease = tlGetEase();

  gsapTL = gsap.timeline({
    paused: true,
    repeat,
    yoyo,
    onUpdate: () => {
      _tlApplying = true;
      TL.currentTime = gsapTL.time();
      // Clamp to duration for display
      if (TL.currentTime > TL.duration) TL.currentTime = TL.duration;
      tlUpdatePlayhead();
      // Sync all active track UIs
      for (const track of TL.activeTracks) {
        tlSyncUI(track);
      }
      _tlApplying = false;
    },
    onComplete: () => {
      if (loopMode === 'once') {
        TL.playing = false;
        tlPlayBtn.innerHTML = '&#9654;';
        tlPlayBtn.classList.remove('active');
      }
    }
  });

  // Build tweens for each active track
  for (const track of TL.activeTracks) {
    const kfs = TL.keyframes[track];
    if (!kfs || kfs.length < 1) continue;
    const reg = TL_REGISTRY[track];
    if (!reg) continue;

    const sorted = [...kfs].sort((a, b) => a.time - b.time);

    if (reg.type === 'shape') {
      // Shape morphs: create blend tweens between different shape values
      for (let i = 0; i < sorted.length - 1; i++) {
        const from = sorted[i], to = sorted[i + 1];
        if (from.value === to.value) continue; // no morph needed
        const dur = to.time - from.time;
        if (dur <= 0) continue;
        const proxy = { blend: 0 };
        gsapTL.to(proxy, {
          blend: 1,
          duration: dur,
          ease,
          onStart: () => {
            shapeTransition.fromShape = from.value;
            shapeTransition.toShape = to.value;
            shapeTransition.active = true;
          },
          onUpdate: () => {
            shapeTransition.fromShape = from.value;
            shapeTransition.toShape = to.value;
            shapeTransition.blend = proxy.blend;
            shapeTransition.active = proxy.blend > 0 && proxy.blend < 1;
            if (proxy.blend >= 1) { state.ringShape = to.value; shapeTransition.active = false; }
            else if (proxy.blend <= 0) { state.ringShape = from.value; shapeTransition.active = false; }
          },
          onReverseComplete: () => {
            state.ringShape = from.value;
            shapeTransition.active = false;
          }
        }, from.time);
      }
      // Set initial shape
      if (sorted.length > 0) {
        gsapTL.call(() => { state.ringShape = sorted[0].value; shapeTransition.active = false; }, [], 0);
      }
    } else if (reg.type === 'color') {
      // Color: bezier evaluation per channel
      if (sorted.length > 0) {
        gsapTL.call(() => {
          state[track][0] = sorted[0].value[0];
          state[track][1] = sorted[0].value[1];
          state[track][2] = sorted[0].value[2];
        }, [], 0);
      }
      for (let i = 0; i < sorted.length - 1; i++) {
        const from = sorted[i], to = sorted[i + 1];
        const dur = to.time - from.time;
        if (dur <= 0) continue;
        const proxy = { progress: 0 };
        const _from = from, _to = to, _dur = dur, _track = track;
        gsapTL.to(proxy, {
          progress: 1, duration: dur, ease: 'none',
          onUpdate: () => {
            const ho = _from.handleOut || { dx: _dur / 3, dy: 0 };
            const hi = _to.handleIn || { dx: -_dur / 3, dy: 0 };
            const p1x = Math.max(0, Math.min(1, ho.dx / _dur));
            const p2x = Math.max(0, Math.min(1, 1 + hi.dx / _dur));
            const t = cubicBezierSolve(proxy.progress, p1x, p2x);
            for (let ch = 0; ch < 3; ch++) {
              const mt = 1 - t;
              const p0 = _from.value[ch], p3 = _to.value[ch];
              const p1 = p0 + ho.dy, p2 = p3 + hi.dy;
              state[_track][ch] = mt*mt*mt*p0 + 3*mt*mt*t*p1 + 3*mt*t*t*p2 + t*t*t*p3;
            }
          }
        }, from.time);
      }
    } else if (reg.type === 'discrete') {
      // Discrete: set value at each keyframe time
      for (const kf of sorted) {
        gsapTL.call(() => { tlSetValue(track, kf.value); }, [], kf.time);
      }
    } else {
      // Numeric: bezier curve evaluation
      if (sorted.length > 0) {
        gsapTL.call(() => { tlSetValue(track, sorted[0].value); }, [], 0);
      }
      for (let i = 0; i < sorted.length - 1; i++) {
        const from = sorted[i], to = sorted[i + 1];
        const dur = to.time - from.time;
        if (dur <= 0) continue;
        const proxy = { progress: 0 };
        const _from = from, _to = to, _dur = dur, _track = track;
        gsapTL.to(proxy, {
          progress: 1, duration: dur, ease: 'none',
          onUpdate: () => {
            const val = evalSegment(proxy.progress, _from, _to, _dur);
            tlSetValue(_track, val);
          }
        }, from.time);
      }
    }
  }

  // Ensure timeline has correct total duration
  // Add an empty tween at the end if needed
  if (gsapTL.duration() < TL.duration) {
    gsapTL.to({}, { duration: 0.001 }, TL.duration);
  }

  return gsapTL;
}

// Rebuild timeline when keyframes, easing, or loop mode change
let _rebuildTimer = null;
function tlScheduleRebuild() {
  clearTimeout(_rebuildTimer);
  _rebuildTimer = setTimeout(() => {
    const wasPlaying = TL.playing;
    const time = TL.currentTime;
    tlBuildGSAPTimeline();
    gsapTL.seek(time, false);
    if (wasPlaying) gsapTL.play();
  }, 50);
}

tlEaseSelect.addEventListener('change', () => {
  const preset = tlEaseSelect.value;
  if (!preset) return;
  tlEaseSelect.value = ''; // Reset dropdown

  // Apply preset handles to all active numeric/color tracks
  for (const track of TL.activeTracks) {
    const reg = TL_REGISTRY[track];
    if (!reg || (reg.type !== 'number' && reg.type !== 'color')) continue;
    const kfs = TL.keyframes[track];
    if (!kfs) continue;

    for (let i = 0; i < kfs.length; i++) {
      const prev = kfs[i - 1], curr = kfs[i], next = kfs[i + 1];
      const dtIn = prev ? (curr.time - prev.time) : 0;
      const dtOut = next ? (next.time - curr.time) : 0;

      if (preset === 'linear') {
        if (dtIn > 0) curr.handleIn = { dx: -dtIn / 3, dy: prev ? -(curr.value - prev.value) / 3 : 0 };
        if (dtOut > 0) curr.handleOut = { dx: dtOut / 3, dy: next ? (next.value - curr.value) / 3 : 0 };
      } else if (preset === 'smooth') {
        // Catmull-rom auto tangent
        delete curr.handleIn;
        delete curr.handleOut;
      } else if (preset === 'easeIn') {
        if (dtIn > 0) curr.handleIn = { dx: -dtIn * 0.6, dy: 0 };
        if (dtOut > 0) curr.handleOut = { dx: dtOut * 0.1, dy: 0 };
      } else if (preset === 'easeOut') {
        if (dtIn > 0) curr.handleIn = { dx: -dtIn * 0.1, dy: 0 };
        if (dtOut > 0) curr.handleOut = { dx: dtOut * 0.6, dy: 0 };
      } else if (preset === 'easeInOut') {
        if (dtIn > 0) curr.handleIn = { dx: -dtIn * 0.5, dy: 0 };
        if (dtOut > 0) curr.handleOut = { dx: dtOut * 0.5, dy: 0 };
      } else if (preset === 'sharp') {
        if (dtIn > 0) curr.handleIn = { dx: -dtIn * 0.01, dy: 0 };
        if (dtOut > 0) curr.handleOut = { dx: dtOut * 0.01, dy: 0 };
      }
    }
    // Re-run auto for smooth preset
    if (preset === 'smooth') {
      if (reg.type === 'color') tlAutoHandlesColor(track);
      else tlAutoHandles(track);
    }
  }
  tlRenderKeyframes();
  tlScheduleRebuild();
});
tlLoopMode.addEventListener('change', tlScheduleRebuild);

// Seek the GSAP timeline (for scrubbing)
function tlApplyAtTime(t) {
  if (!gsapTL) tlBuildGSAPTimeline();
  gsapTL.seek(t, false);
}

// --- Play / Pause ---
tlPlayBtn.addEventListener('click', () => {
  TL.playing = !TL.playing;
  tlPlayBtn.innerHTML = TL.playing ? '&#9646;&#9646;' : '&#9654;';
  tlPlayBtn.classList.toggle('active', TL.playing);
  if (!gsapTL) tlBuildGSAPTimeline();
  if (TL.playing) {
    gsapTL.seek(TL.currentTime, false);
    gsapTL.play();
  } else {
    gsapTL.pause();
  }
});

// --- Stop ---
tlStopBtn.addEventListener('click', () => {
  TL.playing = false;
  TL.currentTime = 0;
  tlPlayBtn.innerHTML = '&#9654;';
  tlPlayBtn.classList.remove('active');
  if (gsapTL) { gsapTL.pause(); gsapTL.seek(0, false); }
  tlUpdatePlayhead();
});

// --- Resize ruler ---
function tlOnResize() {
  tlRenderRuler();
  tlRenderKeyframes();
}
window.addEventListener('resize', tlOnResize);

// Init
requestAnimationFrame(() => {
  tlRenderRuler();
  tlUpdatePlayhead();
});

console.log('Wormhole v3 initialized. Programs:', !!lineProg, !!particleProg, !!compositeProg, !!blurProg);
</script>
