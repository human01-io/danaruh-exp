<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gradient Bars + Logo</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; background: #222; overflow: hidden; cursor: none; }
canvas { display: block; width: 100%; height: 100%; }

.dg.ac { z-index: 100 !important; }
</style>
</head>
<body>

<canvas id="c"></canvas>


<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.156.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

/* ============================================================
   LOGO BEVEL MAP — loaded from Photoshop export
   ============================================================ */
// Load bevel map via Image to avoid file:// CORS issues
const bevelImage = new Image();
const bevelTexture = new THREE.Texture(bevelImage);
bevelTexture.magFilter = THREE.LinearFilter;
bevelTexture.minFilter = THREE.LinearFilter;
bevelImage.onload = () => { bevelTexture.needsUpdate = true; };
bevelImage.src = 'assets/gray-map-logo.png';

/* ============================================================
   SHADERS
   ============================================================ */
const vertexShader = `
uniform float time;
uniform vec3 uColor[6];
uniform vec2 uNoiseScale;
uniform float uNoiseBump;
uniform float uNoiseFlow;
uniform float uNoiseSpeed;
uniform float uNoiseSeed;
uniform vec2 uNoiseFq;
uniform float uNoiseFqScale;
uniform float uNoiseFloor;
uniform float uNoiseCeil;
uniform float uNoiseCeilFactor;

varying vec2 vUv;
varying vec3 vColor;

vec4 permute(vec4 x){ return mod(((x*34.0)+1.0)*x, 289.0); }
vec4 taylorInvSqrt(vec4 r){ return 1.79284291400159 - 0.85373472095314 * r; }

float snoise(vec3 v){
  const vec2 C = vec2(1.0/6.0, 1.0/3.0);
  const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
  vec3 i = floor(v + dot(v, C.yyy));
  vec3 x0 = v - i + dot(i, C.xxx);
  vec3 g = step(x0.yzx, x0.xyz);
  vec3 l = 1.0 - g;
  vec3 i1 = min(g.xyz, l.zxy);
  vec3 i2 = max(g.xyz, l.zxy);
  vec3 x1 = x0 - i1 + C.xxx;
  vec3 x2 = x0 - i2 + 2.0 * C.xxx;
  vec3 x3 = x0 - 1.0 + 3.0 * C.xxx;
  i = mod(i, 289.0);
  vec4 p = permute(permute(permute(
    i.z + vec4(0.0, i1.z, i2.z, 1.0))
    + i.y + vec4(0.0, i1.y, i2.y, 1.0))
    + i.x + vec4(0.0, i1.x, i2.x, 1.0));
  float n_ = 1.0/7.0;
  vec3 ns = n_ * D.wyz - D.xzx;
  vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
  vec4 x_ = floor(j * ns.z);
  vec4 y_ = floor(j - 7.0 * x_);
  vec4 x = x_ * ns.x + ns.yyyy;
  vec4 y = y_ * ns.x + ns.yyyy;
  vec4 h = 1.0 - abs(x) - abs(y);
  vec4 b0 = vec4(x.xy, y.xy);
  vec4 b1 = vec4(x.zw, y.zw);
  vec4 s0 = floor(b0) * 2.0 + 1.0;
  vec4 s1 = floor(b1) * 2.0 + 1.0;
  vec4 sh = -step(h, vec4(0.0));
  vec4 a0 = b0.xzyw + s0.xzyw * sh.xxyy;
  vec4 a1 = b1.xzyw + s1.xzyw * sh.zzww;
  vec3 p0 = vec3(a0.xy, h.x);
  vec3 p1 = vec3(a0.zw, h.y);
  vec3 p2 = vec3(a1.xy, h.z);
  vec3 p3 = vec3(a1.zw, h.w);
  vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
  p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
  vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
  m = m * m;
  return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
}

float random(vec2 c){ return fract(sin(dot(c.xy, vec2(12.9898, 78.233))) * 43758.5453); }

uniform sampler2D uBevelTexVert;
uniform float uLogoScaleVert;
uniform vec2 uResolutionVert;
uniform float uLogoDepth;
uniform vec2 uCameraPanVert;

void main() {
  vec2 noiseCoords = uv * uNoiseScale;
  float noise = snoise(vec3(noiseCoords.x + time * 30.0, noiseCoords.y, time * 20.0));
  vec3 pos = vec3(position.x, position.y, position.z + noise * uNoiseBump);

  // Logo displacement: compute screen-space UV from vertex position
  vec4 clipPos = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
  vec2 ndcPos = clipPos.xy / clipPos.w;
  vec2 screenUV = ndcPos * 0.5 + 0.5;

  float aspectRatio = uResolutionVert.x / uResolutionVert.y;
  vec2 centered = screenUV - 0.5;
  if (aspectRatio > 1.0) {
    centered.x *= aspectRatio;
  } else {
    centered.y /= aspectRatio;
  }

  centered += uCameraPanVert;
  vec2 logoUV = centered / uLogoScaleVert + 0.5;
  if (logoUV.x >= 0.0 && logoUV.x <= 1.0 && logoUV.y >= 0.0 && logoUV.y <= 1.0) {
    float bevel = texture2D(uBevelTexVert, logoUV).r;
    float deviation = bevel - 0.5;
    // Push vertices inward where bevel deviates — debossed into surface
    pos.z -= abs(deviation) * uLogoDepth;
  }

  vColor = uColor[0];
  for(int i = 1; i < 6; i++) {
    float noiseFlow  = uNoiseFlow + float(i) * 0.5;
    float noiseSpeed = uNoiseSpeed + float(i) * 0.5;
    float noiseSeed  = 1.0 + float(i) * uNoiseSeed;
    vec2  noiseFreq  = uNoiseFq * uNoiseFqScale;
    float noiseFloor = uNoiseFloor;
    float noiseCeil  = uNoiseCeil + float(i) * uNoiseCeilFactor;
    float noise = snoise(vec3(
      noiseCoords.x * noiseFreq.x + time * noiseFlow,
      noiseCoords.y * noiseFreq.y,
      time * noiseSpeed + noiseSeed
    ));
    float finalNoise = smoothstep(noiseFloor, noiseCeil, noise);
    vColor = mix(vColor, uColor[i], finalNoise);
  }
  vUv = uv;
  gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
}`;

const fragmentShader = `
uniform float time;
uniform float uMixNoise;
uniform sampler2D uBevelTex;
uniform vec3 uBaseColor;
uniform float uLogoScale;
uniform vec2 uResolution;
uniform float uBevelIntensity;
uniform vec2 uCameraPan;

varying vec2 vUv;
varying vec3 vColor;

float random(vec2 c){ return fract(sin(dot(c.xy, vec2(12.9898, 78.233))) * 43758.5453); }

void main() {
  float rand = random(vUv);
  vec3 gradientColor = vColor;
  gradientColor.rgb += mix(-uMixNoise, uMixNoise, rand);

  // Screen-space UV
  vec2 screenUV = gl_FragCoord.xy / uResolution;
  float aspect = uResolution.x / uResolution.y;
  vec2 centered = screenUV - 0.5;
  if (aspect > 1.0) {
    centered.x *= aspect;
  } else {
    centered.y /= aspect;
  }

  // Offset by camera pan so logo moves with the gradient
  centered += uCameraPan;

  vec2 logoUV = centered / uLogoScale + 0.5;

  vec3 finalColor = gradientColor;

  // Sample Photoshop bevel map: 0.5 = neutral, >0.5 = highlight, <0.5 = shadow
  if (logoUV.x >= 0.0 && logoUV.x <= 1.0 && logoUV.y >= 0.0 && logoUV.y <= 1.0) {
    float bevel = texture2D(uBevelTex, logoUV).r;
    float deviation = bevel - 0.5;

    // Only show bevel where gradient has color
    float brightness = dot(gradientColor - uBaseColor, vec3(1.0)) / 3.0;
    float colorPresence = smoothstep(0.0, 0.1, brightness);

    finalColor += deviation * uBevelIntensity * gradientColor * colorPresence;
  }

  gl_FragColor = vec4(finalColor, 1.0);
}`;

function hexToColor(hex) { return new THREE.Color(hex); }

/* ============================================================
   PRESETS
   ============================================================ */
const presets = {
  'default': {
    noiseScaleX: 2.5, noiseScaleY: 4, noiseBump: 0.25, noiseFlow: 15,
    noiseSpeed: 0, noiseSeed: 25, noiseFqX: 0.75, noiseFqY: 1,
    noiseFqScale: 0.5, noiseFloor: 0.1, noiseCeil: 0.75, noiseCeilFactor: 0.07,
    mixNoise: 0.02, rotX: -0.5, rotY: 0.5,
    grainOpacity: 0.35, grainFreq: 0.85,
    base: '#222222', color1: '#ff8bd1', color2: '#ff5b5b', color3: '#6d93dd',
  },
  'RE1': {
    noiseScaleX: 4.6, noiseScaleY: 0, noiseBump: 0.5, noiseFlow: 52.7,
    noiseSpeed: 48.5, noiseSeed: 25, noiseFqX: 1.67, noiseFqY: 2,
    noiseFqScale: 0.98, noiseFloor: 0, noiseCeil: 1, noiseCeilFactor: 0,
    mixNoise: 0.1, rotX: -0.05, rotY: 0.01,
    base: '#161616', color1: '#5dffd8', color2: '#90ffd5', color3: '#6ddda7',
    logoScale: 0.12, bevelIntensity: 2.3, logoDepth: 0.05,
  },
  'RE2': {
    noiseScaleX: 4.6, noiseScaleY: 0, noiseBump: 0.5, noiseFlow: 8.6,
    noiseSpeed: 54.3, noiseSeed: 30.2, noiseFqX: 0.6, noiseFqY: 1.83,
    noiseFqScale: 0.98, noiseFloor: 0.19, noiseCeil: 0.87, noiseCeilFactor: 0.078,
    mixNoise: 0.1, rotX: -0.05, rotY: 0.01,
    base: '#444444', color1: '#88b5b5', color2: '#8bffea', color3: '#6ddda7',
    logoScale: 0.12, bevelIntensity: 2.3, logoDepth: 0.05,
  },
  'green bars': {
    noiseScaleX: 17.7, noiseScaleY: 0, noiseBump: 0, noiseFlow: 15,
    noiseSpeed: 87.6, noiseSeed: 75.1, noiseFqX: 0.51, noiseFqY: 0.27,
    noiseFqScale: 0.65, noiseFloor: 0.29, noiseCeil: 0.75, noiseCeilFactor: 0.103,
    mixNoise: 0.1, rotX: 0.14, rotY: 0.5,
    grainOpacity: 1, grainFreq: 0.86,
    base: '#282828', color1: '#69ff34', color2: '#55ffa3', color3: '#5cef59',
  },
};

/* ============================================================
   THREE.JS SCENE
   ============================================================ */
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);

const aspect = window.innerWidth / window.innerHeight;
const scale = window.innerWidth < 1024 ? 1 : 0.5;
const camera = new THREE.OrthographicCamera(
  scale * aspect / -2, scale * aspect / 2,
  scale * aspect / 2, scale * aspect / -2,
  -1000, 1000
);
const scene = new THREE.Scene();

const segments = window.innerWidth < 1024 ? 64 : 128;
const geometry = new THREE.PlaneGeometry(1.5, 1.5, segments, segments);

const colors = [
  hexToColor('#222222'), hexToColor('#ff8bd1'),
  hexToColor('#222222'), hexToColor('#ff5b5b'),
  hexToColor('#222222'), hexToColor('#6d93dd'),
];

const logoScale = 0.25;
let baseLogoScale = logoScale;

const mat = new THREE.ShaderMaterial({
  uniforms: {
    time: { value: 0 },
    uColor: { value: colors },
    uNoiseScale: { value: new THREE.Vector2(2.5, 4) },
    uNoiseBump: { value: 0.25 },
    uNoiseFlow: { value: 15 },
    uNoiseSpeed: { value: 0 },
    uNoiseSeed: { value: 25 },
    uNoiseFq: { value: new THREE.Vector2(0.75, 1) },
    uNoiseFqScale: { value: 0.5 },
    uNoiseFloor: { value: 0.1 },
    uNoiseCeil: { value: 0.75 },
    uNoiseCeilFactor: { value: 0.07 },
    uMixNoise: { value: 0.02 },
    uBevelTex: { value: bevelTexture },
    uBevelTexVert: { value: bevelTexture },
    uBaseColor: { value: hexToColor('#222222') },
    uLogoScale: { value: logoScale },
    uLogoScaleVert: { value: logoScale },
    uResolution: { value: new THREE.Vector2(window.innerWidth * window.devicePixelRatio, window.innerHeight * window.devicePixelRatio) },
    uResolutionVert: { value: new THREE.Vector2(window.innerWidth * window.devicePixelRatio, window.innerHeight * window.devicePixelRatio) },
    uBevelIntensity: { value: 2.0 },
    uLogoDepth: { value: 0.03 },
    uCameraPan: { value: new THREE.Vector2(0, 0) },
    uCameraPanVert: { value: new THREE.Vector2(0, 0) },
  },
  vertexShader, fragmentShader,
});

const mesh = new THREE.Mesh(geometry, mat);
mesh.rotation.x = -0.5;
mesh.rotation.y = 0.5;
scene.add(mesh);

function applyPreset(name) {
  const p = presets[name];
  if (!p) return;
  const u = mat.uniforms;
  u.uNoiseScale.value.set(p.noiseScaleX, p.noiseScaleY);
  u.uNoiseBump.value = p.noiseBump;
  u.uNoiseFlow.value = p.noiseFlow;
  u.uNoiseSpeed.value = p.noiseSpeed;
  u.uNoiseSeed.value = p.noiseSeed;
  u.uNoiseFq.value.set(p.noiseFqX, p.noiseFqY);
  u.uNoiseFqScale.value = p.noiseFqScale;
  u.uNoiseFloor.value = p.noiseFloor;
  u.uNoiseCeil.value = p.noiseCeil;
  u.uNoiseCeilFactor.value = p.noiseCeilFactor;
  u.uMixNoise.value = p.mixNoise;
  mesh.rotation.x = p.rotX;
  mesh.rotation.y = p.rotY;
  const base = hexToColor(p.base);
  u.uColor.value[0] = base;
  u.uColor.value[1] = hexToColor(p.color1);
  u.uColor.value[2] = base.clone();
  u.uColor.value[3] = hexToColor(p.color2);
  u.uColor.value[4] = base.clone();
  u.uColor.value[5] = hexToColor(p.color3);
  u.uBaseColor.value = base.clone();
}

/* ============================================================
   RESIZE
   ============================================================ */
function onResize() {
  const w = window.innerWidth, h = window.innerHeight;
  const dpr = window.devicePixelRatio;
  renderer.setPixelRatio(dpr);
  renderer.setSize(w, h);
  mat.uniforms.uResolution.value.set(w * dpr, h * dpr);
  mat.uniforms.uResolutionVert.value.set(w * dpr, h * dpr);
  // Camera bounds updated in updateCamera() each frame
}
window.addEventListener('resize', onResize);

/* ============================================================
   SCROLL ZOOM
   ============================================================ */
// Zoom
let zoom = 1, targetZoom = 1;
const minZoom = 0.15, maxZoom = 1;

window.addEventListener('wheel', (e) => {
  targetZoom -= e.deltaY * 0.001;
  targetZoom = Math.max(minZoom, Math.min(maxZoom, targetZoom));
}, { passive: true });

// Pan — click and drag
let panX = 0, panY = 0;
let targetPanX = 0, targetPanY = 0;
const maxPan = 0.5;
let isDragging = false;
let dragStartX = 0, dragStartY = 0;
let dragStartPanX = 0, dragStartPanY = 0;

window.addEventListener('mousedown', (e) => {
  isDragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  dragStartPanX = targetPanX;
  dragStartPanY = targetPanY;
});
window.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const w = window.innerWidth;
  const scale = zoom * (w < 1024 ? 1 : 0.5);
  const dx = (e.clientX - dragStartX) / w * scale;
  const dy = (e.clientY - dragStartY) / w * scale;
  targetPanX = Math.max(-maxPan, Math.min(maxPan, dragStartPanX - dx));
  targetPanY = Math.max(-maxPan, Math.min(maxPan, dragStartPanY + dy));
});
window.addEventListener('mouseup', () => { isDragging = false; });

// Touch: one finger pan, two finger pinch zoom
let touchStartX = 0, touchStartY = 0;
let touchStartPanX = 0, touchStartPanY = 0;
let touchStartDist = 0, touchStartZoom = 1;

window.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchStartPanX = targetPanX;
    touchStartPanY = targetPanY;
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    touchStartDist = Math.sqrt(dx * dx + dy * dy);
    touchStartZoom = targetZoom;
  }
}, { passive: true });
window.addEventListener('touchmove', (e) => {
  if (e.touches.length === 1) {
    const w = window.innerWidth;
    const scale = zoom * (w < 1024 ? 1 : 0.5);
    const dx = (e.touches[0].clientX - touchStartX) / w * scale;
    const dy = (e.touches[0].clientY - touchStartY) / w * scale;
    targetPanX = Math.max(-maxPan, Math.min(maxPan, touchStartPanX - dx));
    targetPanY = Math.max(-maxPan, Math.min(maxPan, touchStartPanY + dy));
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    targetZoom = Math.max(minZoom, Math.min(maxZoom, touchStartZoom / (dist / touchStartDist)));
  }
}, { passive: true });

function updateCamera() {
  zoom += (targetZoom - zoom) * 0.06;
  panX += (targetPanX - panX) * 0.06;
  panY += (targetPanY - panY) * 0.06;

  const w = window.innerWidth, h = window.innerHeight;
  const a = w / h;
  const s = (w < 1024 ? 1 : 0.5) * zoom;
  camera.left = s * a / -2;
  camera.right = s * a / 2;
  camera.top = s * a / 2;
  camera.bottom = s * a / -2;
  camera.position.x = panX;
  camera.position.y = panY;
  camera.updateProjectionMatrix();

  // Sync logo position with camera
  mat.uniforms.uCameraPan.value.set(panX, panY);
  mat.uniforms.uCameraPanVert.value.set(panX, panY);

  // Scale logo with zoom
  mat.uniforms.uLogoScale.value = baseLogoScale / zoom;
  mat.uniforms.uLogoScaleVert.value = baseLogoScale / zoom;
}

/* ============================================================
   ANIMATE
   ============================================================ */
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  updateCamera();
  // Keep resolution in sync every frame
  const rw = renderer.domElement.width, rh = renderer.domElement.height;
  mat.uniforms.uResolution.value.set(rw, rh);
  mat.uniforms.uResolutionVert.value.set(rw, rh);
  mat.uniforms.time.value = clock.getElapsedTime() * 0.005;
  renderer.render(scene, camera);
}
animate();

/* ============================================================
   DAT.GUI
   ============================================================ */
const guiScript = document.createElement('script');
guiScript.src = 'https://cdn.jsdelivr.net/npm/dat.gui@0.7.9/build/dat.gui.min.js';
guiScript.onload = () => {
  const gui = new dat.GUI({ width: 320 });

  const presetNames = Object.keys(presets);
  const presetState = { current: 'default' };
  const pf = gui.addFolder('Presets');
  pf.add(presetState, 'current', presetNames).name('load preset').onChange(name => {
    applyPreset(name);
    const p = presets[name];
    colorState.base = p.base;
    colorState.color1 = p.color1;
    colorState.color2 = p.color2;
    colorState.color3 = p.color3;
    logoParams.scale = p.logoScale || logoScale;
    baseLogoScale = logoParams.scale;
    if (p.bevelIntensity !== undefined) {
      bevelParams.intensity = p.bevelIntensity;
      mat.uniforms.uBevelIntensity.value = p.bevelIntensity;
    }
    if (p.logoDepth !== undefined) {
      bevelParams.depth = p.logoDepth;
      mat.uniforms.uLogoDepth.value = p.logoDepth;
    }
    for (const key in gui.__folders) {
      gui.__folders[key].__controllers.forEach(c => c.updateDisplay());
    }
  });
  pf.open();

  const f = gui.addFolder('Background');
  f.add(mat.uniforms.uNoiseScale.value, 'x', 0, 20, 0.1).name('noise scale x');
  f.add(mat.uniforms.uNoiseScale.value, 'y', 0, 20, 0.1).name('noise scale y');
  f.add(mat.uniforms.uNoiseBump, 'value', 0, 0.5, 0.01).name('noise bump');
  f.add(mat.uniforms.uNoiseFlow, 'value', 0, 100, 0.1).name('noise flow');
  f.add(mat.uniforms.uNoiseSpeed, 'value', 0, 100, 0.1).name('noise speed');
  f.add(mat.uniforms.uNoiseSeed, 'value', 0, 100, 0.1).name('noise seed');
  f.add(mat.uniforms.uNoiseFq.value, 'x', 0, 2, 0.01).name('noise fq x');
  f.add(mat.uniforms.uNoiseFq.value, 'y', 0, 2, 0.01).name('noise fq y');
  f.add(mat.uniforms.uNoiseFqScale, 'value', 0, 1, 0.01).name('noise fq scale');
  f.add(mat.uniforms.uNoiseFloor, 'value', 0, 1, 0.01).name('noise floor');
  f.add(mat.uniforms.uNoiseCeil, 'value', 0, 1, 0.01).name('noise ceil');
  f.add(mat.uniforms.uNoiseCeilFactor, 'value', 0, 1, 0.001).name('noise ceil factor');
  f.add(mat.uniforms.uMixNoise, 'value', 0, 0.1, 0.001).name('mix noise');
  f.add(mesh.rotation, 'x', -Math.PI * 0.5, Math.PI * 0.5, 0.01).name('plane rotation x');
  f.add(mesh.rotation, 'y', -Math.PI * 0.5, Math.PI * 0.5, 0.01).name('plane rotation y');


  const colorFolder = gui.addFolder('Colors');
  const colorState = { base: '#222222', color1: '#ff8bd1', color2: '#ff5b5b', color3: '#6d93dd' };
  colorFolder.addColor(colorState, 'base').name('base (dark)').onChange(v => {
    const c = hexToColor(v);
    mat.uniforms.uColor.value[0] = c;
    mat.uniforms.uColor.value[2] = c.clone();
    mat.uniforms.uColor.value[4] = c.clone();
    mat.uniforms.uBaseColor.value = c.clone();
  });
  colorFolder.addColor(colorState, 'color1').name('color 1').onChange(v => { mat.uniforms.uColor.value[1] = hexToColor(v); });
  colorFolder.addColor(colorState, 'color2').name('color 2').onChange(v => { mat.uniforms.uColor.value[3] = hexToColor(v); });
  colorFolder.addColor(colorState, 'color3').name('color 3').onChange(v => { mat.uniforms.uColor.value[5] = hexToColor(v); });

  const logoFolder = gui.addFolder('Logo');
  const logoParams = { scale: logoScale };
  logoFolder.add(logoParams, 'scale', 0.05, 1, 0.01).name('logo scale').onChange(v => {
    baseLogoScale = v;
  });
  const bevelParams = { intensity: 2.0, depth: 0.03 };
  logoFolder.add(bevelParams, 'intensity', 0, 5, 0.1).name('bevel intensity').onChange(v => {
    mat.uniforms.uBevelIntensity.value = v;
  });
  logoFolder.add(bevelParams, 'depth', 0, 0.2, 0.005).name('logo depth').onChange(v => {
    mat.uniforms.uLogoDepth.value = v;
  });

  f.open();
};
document.head.appendChild(guiScript);
</script>
